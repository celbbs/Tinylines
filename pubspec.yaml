name: tiny_lines
description: "A minimalist daily journaling app for creating simple, consistent journaling habits."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local storage
  path_provider: ^2.1.5

  # Date and time utilities
  intl: ^0.19.0

  # Calendar view
  table_calendar: ^3.1.2

  # Image picker for photo attachments
  image_picker: ^1.1.2

  # Firebase core
  firebase_core: ^3.0.0

  # Firebase authentication
  firebase_auth: ^5.1.0

  # Firestore database
  cloud_firestore: ^5.1.0

  # Notifications
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Mocking framework for unit tests
  mockito: ^5.4.4

  # Code generation
  build_runner: ^2.4.9

  # Required for faking path_provider in tests
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true